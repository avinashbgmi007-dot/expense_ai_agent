      changes:
        - action: "add_fields"
          fields:
            - "uploadId: String"
            - "createdAt: DateTime"
            - "isIgnored: bool"
            - "userNote: String?"
        - action: "update_method"
          methods: ["constructor", "toMap()", "fromMap()"]
      verify:
        - command: "flutter analyze"
          expected: "0 errors"
        - command: "dart format --set-exit-if-changed"
          expected: "0 changes needed"
      on_error: "request_ai_fix"
      retry_count: 2
    
    - task_id: "1.2"
