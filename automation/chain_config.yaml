# ============================================================================
# VERIFICATION & REPORTING
# ============================================================================
verification:
  enable_phase_verification: true
  enable_compilation_check: true
  enable_test_verification: true
  enable_performance_check: true
  
output:
  log_file: "automation_logs/chain_execution.log"
  report_file: "automation_logs/chain_report.json"
  generated_files_dir: "automation_logs/generated_code"
  error_report_file: "automation_logs/errors.log"

# ============================================================================
# ERROR HANDLING STRATEGY
# ============================================================================
error_handling:
  on_generation_error: "request_ai_retry"
  on_compilation_error: "request_ai_fix_with_error_feedback"
  on_test_failure: "request_ai_debug"
  max_retries: 3
  save_failed_attempts: true
  failed_attempts_dir: "automation_logs/failed_attempts"

# ============================================================================
# NOTIFICATION & LOGGING
# ============================================================================
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  console_output: true
  file_output: true
  timestamp_format: "%Y-%m-%d %H:%M:%S"
  include_ai_prompts: false  # Don't log full prompts for privacy
  include_generated_code: true

notifications:
  on_phase_complete: true
  on_error: true
  on_all_complete: true
  slack_webhook: false  # Optional
  email_notifications: false  # Optional
