# ============================================================================
# PHASE 2: CATEGORIZATION SERVICE (Day 2)
# ============================================================================
phase_2:
  name: "Categorization Service Implementation"
  description: "Build merchant keyword categorization with 3-level matching"
  source_md: "DETAILED_IMPLEMENTATION_PLAN.md"
  architecture_md: "TECHNICAL_ARCHITECTURE.md"
  
  dependencies:
    - "phase_1"  # Must complete Phase 1 first
  
  tasks:
    - task_id: "2.1"
      name: "Create CategorizationService"
      target_file: "lib/services/categorization_service.dart"
      language: "dart"
      source_section: "DETAILED_IMPLEMENTATION_PLAN.md -> Days 2-3: Create Categorization Service"
      action: "create_file"
      instructions: |
        Create CategorizationService with:
        1. 200+ Indian merchant keywords database
        2. categorizeTransaction() method
        3. _matchByKeywords() - Level 1 matching
        4. _matchByAmount() - Level 2 heuristic
        5. _categorizeWithAI() - Level 3 fallback
      verify:
        - command: "flutter analyze"
          expected: "0 errors"
      on_error: "request_ai_fix"
      retry_count: 2
    
    - task_id: "2.2"
      name: "Add Unit Tests for Categorization"
      target_file: "test/services/categorization_service_test.dart"
      language: "dart"
      action: "create_file"
      dependencies:
        - "2.1"
      instructions: |
        Create unit tests:
        1. Test Swiggy → food
        2. Test Uber → transport
        3. Test Netflix → subscriptions
        4. Test unknown → miscellaneous
        5. Test edge cases (lowercase, spaces, typos)
      verify:
        - command: "flutter test test/services/categorization_service_test.dart"
          expected: "all tests pass"
      on_error: "request_ai_fix"
      retry_count: 1

